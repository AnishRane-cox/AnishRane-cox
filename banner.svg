<svg viewBox="0 0 860 200" xmlns="http://www.w3.org/2000/svg" width="100%">
  <defs>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#1D9E75" stroke-width="0.5"/>
    </pattern>
    <style>
      .name { font: 700 52px 'Segoe UI', Arial, sans-serif; fill: #f0faf5; letter-spacing: -2px; }
      .mono { font: 400 11px 'Courier New', monospace; fill: #1D9E75; }
      .sub  { font: 400 14px 'Segoe UI', Arial, sans-serif; fill: #9FE1CB; }
    </style>
  </defs>

  <rect width="860" height="160" fill="#0a0f0d"/>
  <rect width="860" height="160" fill="url(#grid)" opacity="0.07"/>

  <circle cx="740" cy="80" r="90" fill="none" stroke="#1D9E75" stroke-width="0.8" stroke-dasharray="5 7" opacity="0.3"/>
  <circle cx="740" cy="80" r="60" fill="none" stroke="#1D9E75" stroke-width="0.5" stroke-dasharray="3 9" opacity="0.25"/>
  <circle cx="740" cy="80" r="30" fill="none" stroke="#1D9E75" stroke-width="0.5" opacity="0.2"/>
  <line x1="660" y1="80" x2="820" y2="80" stroke="#1D9E75" stroke-width="0.4" opacity="0.2"/>
  <line x1="740" y1="10" x2="740" y2="150" stroke="#1D9E75" stroke-width="0.4" opacity="0.2"/>
  <circle cx="740" cy="80" r="4" fill="#1D9E75" opacity="0.7"/>

  <text x="48" y="48"  class="mono">// Data &amp; AI Engineer</text>
  <text x="46" y="100" class="name">Anish Rane</text>
  <text x="48" y="130" class="sub">Bridging Mechanical Systems · Agentic AI · MARL · Industrial EV</text>
</svg>
